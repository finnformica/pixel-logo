<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Headshots</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .hs-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 auto 24px;
        justify-content: center;
      }
      .hs-controls label {
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #9a9a9a;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hs-controls input[type="color"] {
        width: 36px;
        height: 36px;
        border: 1px solid #2f2f33;
        background: none;
        cursor: pointer;
        padding: 2px;
      }
      .hs-controls button {
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 1px;
        padding: 8px 14px;
        background: #252526;
        border: 1px solid #2f2f33;
        color: #d0d0d0;
        cursor: pointer;
      }
      .hs-controls button:hover {
        background: #222226;
        border-color: #444;
      }
      .hs-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        width: max-content;
        margin: 0 auto;
      }
      .hs-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .hs-card canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
      .hs-card .hs-label {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #888;
      }
      .hs-card .download-btn {
        position: absolute;
        top: 4px;
        right: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Pixel Headshots</h1>
    <p class="intro">32 × 32 transparent-background portraits — pick a background colour or keep transparent.</p>

    <div class="hs-controls">
      <label>
        Background
        <input type="color" id="bgColour" value="#D0D0D0" />
      </label>
      <button id="clearBg">Transparent</button>
    </div>

    <div class="hs-grid" id="hsGrid"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="pixels.js"></script>
    <script src="headshots-pixels.js"></script>
    <script src="download.js"></script>
    <script src="navbar.js"></script>
    <script src="headshot.js"></script>
  </body>
</html>
