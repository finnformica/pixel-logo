<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Art Characters</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="topbar">
      <a href="index.html" class="active">CHARACTERS</a>
      <a href="logos.html">LOGO IDEAS</a>
    </nav>

    <h1>Pixel Art Characters</h1>

    <h2>— CANVAS —</h2>
    <div class="grid" id="canvasGrid"></div>

    <h2>— SVG —</h2>
    <div class="grid" id="svgGrid"></div>

    <script src="pixels.js"></script>
    <script>
      const canvasGrid = document.getElementById("canvasGrid");
      const svgGrid = document.getElementById("svgGrid");

      characters.forEach(({ name, map }) => {
        const c1 = document.createElement("div");
        c1.className = "cell";
        c1.appendChild(renderCanvas(map));
        canvasGrid.appendChild(c1);

        const c2 = document.createElement("div");
        c2.className = "cell";
        c2.appendChild(renderSVG(map));
        svgGrid.appendChild(c2);
      });
    </script>
  </body>
</html>
