<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Art Characters</title>
    <style>
      body {
        background: #fafafa;
        font-family: "Courier New", monospace;
        padding: 24px;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      h1 {
        text-align: center;
        margin: 0 0 8px;
      }
      h2 {
        text-align: center;
        color: #555;
        margin: 24px 0 12px;
        font-size: 14px;
        letter-spacing: 2px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        width: max-content;
        margin: 0 auto;
        justify-items: center;
        align-items: center;
      }
      .cell {
        background: #fff;
        border: 1px solid #ddd;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 280px;
        height: 280px;
        box-sizing: border-box;
      }
      canvas,
      svg {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <h1>Pixel Art Characters</h1>

    <h2>— CANVAS —</h2>
    <div class="grid" id="canvasGrid"></div>

    <h2>— SVG —</h2>
    <div class="grid" id="svgGrid"></div>

    <script>
      // Palette extracted from the source PNG (sampled cell centers).
      const palette = {
        ".": null, // transparent
        K: "#000000", // black outline
        W: "#F8F8F8", // white
        c: "#A8E0F8", // light cyan       (Bub head)
        B: "#0068E8", // dark blue         (Bub body shadow)
        p: "#F870B0", // pink              (Bub mouth/feet)
        r: "#E80058", // red               (eye / red flower)
        o: "#F87060", // coral / salmon    (Pink flower body, accents)
        g: "#48D848", // green             (Green dragon body, leaves)
        t: "#82ACDD", // light blue        (Blue dragon body)
        C: "#214C89", // dark blue         (Blue dragon shadow)
      };

      // Pixel maps extracted directly from the PNG by sampling each grid cell.
      // '.' = transparent background, all other chars are palette keys above.

      const bub = [
        ".....KKKKKK.......",
        "....KccccccKKK....",
        "...KccccccccccK...",
        "..KccccccccccccK..",
        "..KccccccccccccK..",
        "..KcKcKccccccccK..",
        "..KcKcKccccKKcKK..",
        "..KcKcKcccKccKccK.",
        "..KccccccKcKKcKKcK",
        "...KKKKKKKcKKcKKcK",
        "..KKKKKKKKKccKccK.",
        ".KBBBBBBBBBKKBKK..",
        ".KBBBBBBBBBBBBBK..",
        "KppppBBBBBBBBBBK..",
        ".KppppBBBBBBBBK...",
        "..KppppKKpppKK....",
        "...KKKKppppppK....",
        ".......KKKKKK.....",
      ];

      const ghost = [
        "......KKKK.........",
        "....KK....KK.......",
        "...K........K......",
        "..K......rrr.K.....",
        "..K.....rrorr.K....",
        ".K......ro.orr.K...",
        ".K......ro.orr.K...",
        ".K.......rorrr.K...",
        ".K..K..K..rrr...K..",
        ".K.KKKKK........K..",
        "..KKKKKKK.K..K..K..",
        "...KKKKKKKK..K..K..",
        "..K.K.KKKKKKK....K.",
        "...K...K..K.......K",
        "...K..............K",
        "..K....KK....KKKKK.",
        "...KKKK..KKKK......",
        "...................",
      ];

      const greenDragon = [
        ".........K........",
        "........KoK.......",
        "....KKKKoooKK.....",
        "...KoooogggggK....",
        "....KoogggggggK...",
        "...KKKgggg..g.gK..",
        "..Koooggg..KgK.K..",
        "...Kogggg..KgK.K..",
        "...KKgggg..KgK.gK.",
        "..Koogggg..KgK.gK.",
        "...Koggggg..g.ggK.",
        "...KKgoggKKK.KKK..",
        ".K.KgooogggggggK..",
        "KgKKgooogg....KK..",
        "Kgoogoogg......K..",
        ".Kggggggoo.....KK.",
        "..Kggggoooo...oooK",
        "..KKKKKKKKKKKKKKK.",
      ];

      const pinkFlower = [
        "..........KK......",
        "......KKKK..K.....",
        ".....Kooo...K.....",
        "....Koooo..ooK....",
        "..KKooo..oooooKK..",
        ".Koooo...oooooooK.",
        "Kogooo..oooooooooK",
        "KgggooooooooooogoK",
        "KgggoooooooooogggK",
        "KogooooKooKooogggK",
        ".KooooooooooooogK.",
        "..KKoooKooKoooKK..",
        "..KooooKooKooooK..",
        ".KgggooKooKooooK..",
        ".KgggoooooooooggK.",
        ".KgggoKooooKogggK.",
        "..KggoKKKKKKoggK..",
        "...KKK......KKK...",
      ];

      const whiteFlower = [
        "........KKKKKK....",
        ".....KKK......K...",
        "....K..........K..",
        "...K.........KK...",
        "...K.........K....",
        "..K..KKK......K...",
        "..K.KrKrK.....K...",
        "..K.r.r.rK....K...",
        ".KK.rrrrrK.K.K....",
        "K..KKrKr....KK....",
        ".K....K.......K...",
        ".K...K........K...",
        "..K..K.........KK.",
        "..K...KK.......K.K",
        "..KK.....ooo.....K",
        "..Kooo...oooo...K.",
        ".Kooooo...ooo.KK..",
        "..KKKKKKKKKKKK....",
      ];

      const blueDragon = [
        ".........K........",
        "........KCK.......",
        "....KKKKCCCKK.....",
        "...KCCCCtttttK....",
        "....KCCtttttttK...",
        "...KKKtttt..t.tK..",
        "..KCCCttt..KtK.K..",
        "...KCtttt..KtK.K..",
        "...KKtttt..KtK.tK.",
        "..KCCtttt..KtK.tK.",
        "...KCttttt..t.ttK.",
        "...KKtCttKKK.KKK..",
        ".K.KtCCCtttttttK..",
        "KtKKtCCCtt....KK..",
        "KtCCtCCtt......K..",
        ".KttttttCC.....KK.",
        "..KttttCCCC...CCCK",
        "..KKKKKKKKKKKKKKK.",
      ];

      const characters = [
        { name: "Bub", map: bub },
        { name: "Ghost", map: ghost },
        { name: "GreenDragon", map: greenDragon },
        { name: "PinkFlower", map: pinkFlower },
        { name: "WhiteFlower", map: whiteFlower },
        { name: "BlueDragon", map: blueDragon },
      ];

      const PIXEL = 14; // size of each pixel in screen px

      function renderCanvas(map) {
        const w = map[0].length,
          h = map.length;
        const cv = document.createElement("canvas");
        cv.width = w * PIXEL;
        cv.height = h * PIXEL;
        const ctx = cv.getContext("2d");
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const ch = map[y][x];
            const color = palette[ch];
            if (!color) continue;
            ctx.fillStyle = color;
            ctx.fillRect(x * PIXEL, y * PIXEL, PIXEL, PIXEL);
          }
        }
        return cv;
      }

      function renderSVG(map) {
        const w = map[0].length,
          h = map.length;
        const SVG_NS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("width", w * PIXEL);
        svg.setAttribute("height", h * PIXEL);
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
        svg.setAttribute("shape-rendering", "crispEdges");
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const ch = map[y][x];
            const color = palette[ch];
            if (!color) continue;
            const r = document.createElementNS(SVG_NS, "rect");
            r.setAttribute("x", x);
            r.setAttribute("y", y);
            r.setAttribute("width", 1);
            r.setAttribute("height", 1);
            r.setAttribute("fill", color);
            svg.appendChild(r);
          }
        }
        return svg;
      }

      const canvasGrid = document.getElementById("canvasGrid");
      const svgGrid = document.getElementById("svgGrid");

      characters.forEach(({ name, map }) => {
        const c1 = document.createElement("div");
        c1.className = "cell";
        c1.appendChild(renderCanvas(map));
        canvasGrid.appendChild(c1);

        const c2 = document.createElement("div");
        c2.className = "cell";
        c2.appendChild(renderSVG(map));
        svgGrid.appendChild(c2);
      });
    </script>
  </body>
</html>
